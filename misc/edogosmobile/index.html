<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-Dog OS Mobile is like regular E-Dog OS, but better for mobile.">
    <title>E-Dog OS Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --phone-w: 375px;
            --phone-h: 667px;
            --gold-light: #f5c842;
            --gold-mid: #c9a020;
            --gold-dark: #6b5a1e;
            --text-primary: #1a1a1a;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --ring-color: rgba(235, 210, 100, 0.85);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        body {
            position: relative;
        }

        .phone-frame {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 375px;
            height: 667px;
            transform-origin: center center;
            overflow: hidden;
        }

        .screen-slider {
            display: flex;
            width: calc(var(--phone-w) * 2);
            height: 100%;
            transition: transform 0.45s cubic-bezier(0.4, 0.0, 0.2, 1);
            will-change: transform;
            transform: translateX(calc(var(--phone-w) * -1));
            position: relative;
            z-index: 1;
        }


        .screen-slider.show-passcode {
            transform: translateX(0);
        }

        .screen {
            width: var(--phone-w);
            height: var(--phone-h);
            flex-shrink: 0;
            position: relative;
        }

        .status-bar-global {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            pointer-events: none;
            color: var(--text-secondary);

            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px 0;
            width: 100%;
        }

        .status-bar svg {
            display: block;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .icon {
            display: block;
            object-fit: contain;
        }

        .icon-dark {
            filter: brightness(0) saturate(100%);
        }

        .icon-light {
            filter: brightness(0) invert(1);
        }

        /* ─── LOCK SCREEN ─── */
        .lock-screen {
            background:
                radial-gradient(ellipse at 30% 20%, #fdd835 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #f9a825 0%, transparent 50%),
                linear-gradient(160deg, #fdd835 0%, #f9a825 40%, #c49000 100%);
            background-blend-mode: normal;
        }

        .lock-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
            background-size: 6px 6px;
            pointer-events: none;
        }

        .lock-time {
            text-align: center;
            padding-top: 70px;
        }

        .lock-time .time {
            font-size: 80px;
            font-weight: 200;
            letter-spacing: -2px;
            color: var(--text-primary);
            line-height: 1;
        }

        .lock-time .date {
            font-size: 20px;
            font-weight: 400;
            color: var(--text-primary);
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        /* ─── Slide to Unlock ─── */
        .slide-track {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 50px;
            display: flex;
            align-items: center;
            text-align: center;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }

        .slide-track:active {
            cursor: grabbing;
        }

        .slide-chevron {
            font-size: 28px;
            color: var(--text-primary);
            opacity: 0.35;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .slide-text {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 1px;
            background: linear-gradient(90deg,
                    rgba(60, 50, 20, 0.15) 0%,
                    rgba(60, 50, 20, 0.7) 50%,
                    rgba(60, 50, 20, 0.15) 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }

        .camera-icon {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 34px;
            height: 34px;
            border: 2px solid rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ─── PASSCODE SCREEN ─── */
        .passcode-screen {
            background:
                radial-gradient(ellipse at 50% 30%, rgba(120, 100, 40, 0.5) 0%, transparent 60%),
                linear-gradient(170deg, #6b5a1e 0%, #4a3d12 50%, #352c0d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .passcode-title {
            margin-top: 80px;
            font-size: 22px;
            font-weight: 300;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .passcode-dots {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .passcode-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--ring-color);
            background: transparent;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .passcode-dot.filled {
            background: #fff;
            border-color: #fff;
            transform: scale(1.1);
        }

        .passcode-dot.error {
            border-color: #e74c3c;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        /* ─── Keypad ─── */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 18px;
            margin-top: 40px;
        }

        .key {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1.5px solid var(--ring-color);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.12s ease, transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .key:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .key:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.95);
        }

        .key .digit {
            font-size: 32px;
            font-weight: 300;
            line-height: 1;
        }

        .key .letters {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 2px;
            margin-top: 2px;
            opacity: 0.7;
        }

        .key.zero {
            grid-column: 2;
        }

        .cancel-btn {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            font-weight: 400;
            cursor: pointer;
            padding: 8px 12px;
            letter-spacing: 0.3px;
        }

        .cancel-btn:hover {
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="phone-frame">
        <div class="status-bar status-bar-global">
            <img src="icons/network/network-wireless-signal-excellent-symbolic.svg" class="icon signal icon-dark">

            <div class="status-icons">
                <img src="icons/battery/battery-level-100-charged-symbolic.svg" class="icon battery icon-dark">
            </div>
        </div>

        <div class="screen-slider" id="slider">
            <div class="screen passcode-screen" id="passcodeScreen">
                <div class="passcode-title">Enter Passcode</div>

                <div class="passcode-dots" id="passcodeDots">
                    <div class="passcode-dot" data-index="0"></div>
                    <div class="passcode-dot" data-index="1"></div>
                    <div class="passcode-dot" data-index="2"></div>
                    <div class="passcode-dot" data-index="3"></div>
                </div>

                <div class="keypad" id="keypad">
                    <button class="key" data-digit="1">
                        <span class="digit">1</span>
                    </button>
                    <button class="key" data-digit="2">
                        <span class="digit">2</span>
                        <span class="letters">ABC</span>
                    </button>
                    <button class="key" data-digit="3">
                        <span class="digit">3</span>
                        <span class="letters">DEF</span>
                    </button>
                    <button class="key" data-digit="4">
                        <span class="digit">4</span>
                        <span class="letters">GHI</span>
                    </button>
                    <button class="key" data-digit="5">
                        <span class="digit">5</span>
                        <span class="letters">JKL</span>
                    </button>
                    <button class="key" data-digit="6">
                        <span class="digit">6</span>
                        <span class="letters">MNO</span>
                    </button>
                    <button class="key" data-digit="7">
                        <span class="digit">7</span>
                        <span class="letters">PQRS</span>
                    </button>
                    <button class="key" data-digit="8">
                        <span class="digit">8</span>
                        <span class="letters">TUV</span>
                    </button>
                    <button class="key" data-digit="9">
                        <span class="digit">9</span>
                        <span class="letters">WXYZ</span>
                    </button>
                    <button class="key zero" data-digit="0">
                        <span class="digit">0</span>
                    </button>
                </div>

                <button class="cancel-btn" id="cancelBtn">Cancel</button>
            </div>

            <div class="screen lock-screen" id="lockScreen">
                <div class="lock-time">
                    <div class="time" id="clockTime">9:20</div>
                    <div class="date" id="clockDate">Saturday, December 27</div>
                </div>

                <div class="slide-track" id="slideTrack">
                    <span class="slide-chevron">&#x276F;</span>
                    <span class="slide-text">slide to unlock</span>
                </div>

                <div class="camera-icon">
                    <svg width="18" height="16" viewBox="0 0 18 16" fill="none" stroke="rgba(0,0,0,0.35)"
                        stroke-width="1.5">
                        <path d="M1 5a2 2 0 012-2h2l1.5-2h5L13 3h2a2 2 0 012 2v8a2 2 0 01-2 2H3a2 2 0 01-2-2V5z" />
                        <circle cx="9" cy="8.5" r="3" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── Live clock ───
        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes();
            document.getElementById('clockTime').textContent =
                `${h > 12 ? h - 12 : h || 12}:${String(m).padStart(2, '0')}`;
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('clockDate').textContent =
                `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
        }
        updateClock();
        setInterval(updateClock, 10000);

        // ─── Swipe / drag to unlock ───
        const slider = document.getElementById('slider');
        const lockScreen = document.getElementById('lockScreen');
        const track = document.getElementById('slideTrack');
        let startX = 0, dragging = false;

        lockScreen.addEventListener('pointerdown', (e) => {
            dragging = true;
            startX = e.clientX;
            lockScreen.setPointerCapture(e.pointerId);
        });

        lockScreen.addEventListener('pointermove', (e) => {
            if (!dragging) return;
            const diff = e.clientX - startX;
            if (diff > 60) {
                dragging = false;
                // Slide passcode screen in from the left
                slider.classList.add('show-passcode');
            }
        });

        lockScreen.addEventListener('pointerup', () => { dragging = false; });
        lockScreen.addEventListener('pointercancel', () => { dragging = false; });

        // Tap fallback on the slide text area
        track.addEventListener('click', () => {
            slider.classList.add('show-passcode');
        });

        // ─── Cancel → back to lock screen ───
        document.getElementById('cancelBtn').addEventListener('click', () => {
            slider.classList.remove('show-passcode');
            code = [];
            document.querySelectorAll('.passcode-dot').forEach(d => d.classList.remove('filled'));
        });

        // ─── Minimal keypad wiring ───
        let code = [];
        const dots = document.querySelectorAll('.passcode-dot');

        document.getElementById('keypad').addEventListener('click', (e) => {
            const key = e.target.closest('.key');
            if (!key || code.length >= 4) return;

            code.push(key.dataset.digit);
            dots[code.length - 1].classList.add('filled');

            if (code.length === 4) {
                console.log('Entered code:', code.join(''));
            }
        });

        function scalePhone() {
            const phone = document.querySelector('.phone-frame');
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            const baseW = 375;
            const baseH = 667;

            // Smooth fit: no branching, no sudden flip
            const scale = Math.min(vw / baseW, vh / baseH);

            phone.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        window.addEventListener('resize', scalePhone);
        window.addEventListener('orientationchange', scalePhone);
        window.addEventListener('DOMContentLoaded', scalePhone);
    </script>

</body>

</html>
