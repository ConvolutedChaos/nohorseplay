                <div class="range range-xs-center offset-top-0 offset-md-top-26">
                    <div class="cell-xl-10">
                        <h1>Image Converter</h1>
                        <section class="section section-lg-122 section-65 bg-default novi-background">
                            <div class="shell shell-wide">
                                <div class="range range-xs-center offset-top-0 offset-md-top-26">
                                    <div class="cell-xl-10">
                                        <!-- HTML can go here... -->
                                        <div id="converter">
                                            <input type="file" id="imageInput" accept="image/*">
                                            <br><br>

                                            <label for="formatSelect">Convert to:</label>
                                            <select id="formatSelect">
                                                <option value="image/jpeg">JPG</option>
                                                <option value="image/png">PNG</option>
                                                <option value="image/webp">WebP</option>
                                            </select>

                                            <span id="qualityWrapper">
                                                &nbsp;&nbsp;<label for="qualitySlider">Quality: <span
                                                        id="qualityLabel">92</span>%</label>
                                                <input type="range" id="qualitySlider" min="1" max="100" value="92">
                                            </span>

                                            <br><br>

                                            <div id="previewArea" style="display:none;">
                                                <table>
                                                    <tr>
                                                        <th>Original</th>
                                                        <th>Converted</th>
                                                    </tr>
                                                    <tr>
                                                        <td>
                                                            <img id="originalPreview"
                                                                style="max-width:300px; max-height:300px; display:block;">
                                                            <small id="originalInfo"></small>
                                                        </td>
                                                        <td>
                                                            <img id="convertedPreview"
                                                                style="max-width:300px; max-height:300px; display:block;">
                                                            <small id="convertedInfo"></small>
                                                        </td>
                                                    </tr>
                                                </table>
                                                <br>
                                                <a id="downloadLink" download>Download Converted Image</a>
                                            </div>

                                            <canvas id="workCanvas" style="display:none;"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <script>
                            (function () {
                                const input = document.getElementById('imageInput');
                                const formatSel = document.getElementById('formatSelect');
                                const qualSlider = document.getElementById('qualitySlider');
                                const qualLabel = document.getElementById('qualityLabel');
                                const qualWrapper = document.getElementById('qualityWrapper');
                                const origImg = document.getElementById('originalPreview');
                                const convImg = document.getElementById('convertedPreview');
                                const origInfo = document.getElementById('originalInfo');
                                const convInfo = document.getElementById('convertedInfo');
                                const dlLink = document.getElementById('downloadLink');
                                const preview = document.getElementById('previewArea');
                                const canvas = document.getElementById('workCanvas');
                                const ctx = canvas.getContext('2d');

                                let currentFile = null;

                                const LOSSY = ['image/jpeg', 'image/webp'];
                                const EXT = { 'image/jpeg': 'jpg', 'image/png': 'png', 'image/webp': 'webp' };

                                function formatBytes(n) {
                                    return n < 1024 ? n + ' B'
                                        : n < 1048576 ? (n / 1024).toFixed(1) + ' KB'
                                            : (n / 1048576).toFixed(2) + ' MB';
                                }

                                function updateQualityVisibility() {
                                    qualWrapper.style.display = LOSSY.includes(formatSel.value) ? '' : 'none';
                                }

                                function convert() {
                                    if (!currentFile) return;

                                    const fmt = formatSel.value;
                                    const quality = parseInt(qualSlider.value) / 100;
                                    const img = new Image();

                                    img.onload = function () {
                                        canvas.width = img.naturalWidth;
                                        canvas.height = img.naturalHeight;

                                        // PNG needs a white background when converting from transparent sources to JPG
                                        if (fmt === 'image/jpeg') {
                                            ctx.fillStyle = '#ffffff';
                                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                                        } else {
                                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                                        }

                                        ctx.drawImage(img, 0, 0);

                                        const dataURL = canvas.toDataURL(fmt, quality);

                                        convImg.src = dataURL;

                                        // Estimate converted size from base64
                                        const base64 = dataURL.split(',')[1];
                                        const approxBytes = Math.round((base64.length * 3) / 4);
                                        convInfo.textContent = `${canvas.width}×${canvas.height} · ~${formatBytes(approxBytes)}`;

                                        const baseName = currentFile.name.replace(/\.[^.]+$/, '');
                                        dlLink.href = dataURL;
                                        dlLink.download = `${baseName}.${EXT[fmt]}`;

                                        preview.style.display = '';
                                    };

                                    img.src = URL.createObjectURL(currentFile);
                                    origImg.src = img.src;
                                    origInfo.textContent = `${currentFile.name} · ${formatBytes(currentFile.size)}`;
                                }

                                input.addEventListener('change', function () {
                                    currentFile = this.files[0] || null;
                                    if (currentFile) convert();
                                });

                                formatSel.addEventListener('change', function () {
                                    updateQualityVisibility();
                                    convert();
                                });

                                qualSlider.addEventListener('input', function () {
                                    qualLabel.textContent = this.value;
                                });

                                qualSlider.addEventListener('change', convert);

                                updateQualityVisibility();
                            })();
                        </script>
