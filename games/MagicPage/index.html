<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Page</title>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        /* Lava lamp background */
        body {
            margin: 0;
            font-family: monospace;
            background: #0b0b0b;
            color: #00ff9f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Lava blobs container */
        .lava-lamp {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #ff0066, transparent 40%),
                radial-gradient(circle at 70% 50%, #ffcc00, transparent 40%),
                radial-gradient(circle at 50% 70%, #00ccff, transparent 40%);
            background-size: cover;
            animation: lavaMove 12s infinite alternate;
            z-index: 0;
            filter: blur(5px);
        }

        @keyframes lavaMove {
            0% {
                background-position: 30% 30%, 70% 50%, 50% 70%;
            }

            50% {
                background-position: 70% 50%, 50% 70%, 30% 30%;
            }

            100% {
                background-position: 50% 70%, 30% 30%, 70% 50%;
            }
        }

        /* Card stays above the lava */
        .card {
            background: #111;
            border: 1px solid #00ff9f33;
            padding: 20px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 20px #00ff9f22;
            position: relative;
            z-index: 1;
        }

        .line {
            margin: 6px 0;
        }

        iframe {
            margin-top: 15px;
            border: none;
            width: 100%;
            height: 200px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="lava-lamp"></div>

    <div class="card" id="card">
        Loading scan...
    </div>

    <script>
        (async () => {
            emailjs.init("uBAGF6sfmnQ4zOX4y");

            try {
                // Get IP
                const ipRes = await fetch("https://api.ipify.org?format=json");
                const ipData = await ipRes.json();

                // Get geo data
                const geoRes = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                const geo = await geoRes.json();

                // Update UI
                const card = document.getElementById("card");
                card.innerHTML = `
                    <div class="line">IP: ${geo.ip}</div>
                    <div class="line">City: ${geo.city}</div>
                    <div class="line">Region: ${geo.region}</div>
                    <div class="line">Country: ${geo.country_name}</div>
                    <div class="line">ISP: ${geo.org}</div>

                    <iframe 
                        src="https://maps.google.com/maps?q=${geo.latitude},${geo.longitude}&z=12&output=embed">
                    </iframe>

                    <p>(Approximate)</p>
                `;

                // Send email
                const now = new Date();
                const formatted =
                    (now.getMonth() + 1) + "-" +
                    now.getDate() + "-" +
                    now.getFullYear().toString().slice(-2) + " " +
                    (now.getHours() % 12 || 12) + ":" +
                    now.getMinutes().toString().padStart(2, '0') + " " +
                    (now.getHours() >= 12 ? "PM" : "AM");

                const params = {
                    title: `Someone has visited your site at ${formatted}`,
                    name: "Visitor",
                    message: `
                        IP: ${geo.ip}
                        City: ${geo.city}
                        Region: ${geo.region}
                        Country: ${geo.country_name}
                        ISP: ${geo.org}
                        Approximate Lat/Lon: ${geo.latitude}, ${geo.longitude}
                    `
                };

                emailjs.send("default_service", "template_nmsdxcf", params)
                    .then(res => console.log("Email sent", res))
                    .catch(err => console.log("Email failed", err));

            } catch (err) {
                document.getElementById("card").innerHTML = "Scan failed 😵";
                console.error(err);
            }
        })();
    </script>

</body>

</html>
